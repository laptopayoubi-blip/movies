<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            background:#111;
            color:white;
            font-family:Arial,sans-serif;
            overflow-x:hidden;
        }

        .back-btn{
            position:fixed;
            top:20px;
            left:20px;
            z-index:100;
            border:none;
            padding:12px 24px;
            border-radius:8px;
            background:#e50914;
            color:white;
            cursor:pointer;
            font-size:16px;
            transition:.3s;
        }

        .back-btn:hover{
            transform:scale(1.05);
        }

        .banner{
            min-height:100vh;
            background-size:cover;
            background-position:center;
            display:flex;
            align-items:center;
        }

        .banner-content{
            width:100%;
            max-width:1300px;
            margin:auto;
            padding:60px;
            display:flex;
            gap:50px;
            align-items:center;
            animation:fadeIn .8s ease;
        }

        .poster{
            width:340px;
            border-radius:16px;
            box-shadow:0 20px 50px rgba(0,0,0,.7);
        }

        .info{
            max-width:700px;
        }

        .info h1{
            font-size:4rem;
            margin-bottom:20px;
        }

        .stats{
            display:flex;
            gap:20px;
            font-size:1.2rem;
            margin-bottom:25px;
        }

        .overview{
            font-size:1.15rem;
            line-height:1.8;
            color:#e0e0e0;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:900px){

            .banner-content{
                flex-direction:column;
                text-align:center;
                padding:30px;
            }

            .poster{
                width:260px;
            }

            .info h1{
                font-size:2.5rem;
            }

            .stats{
                justify-content:center;
                flex-wrap:wrap;
            }
        }

    </style>

</head>
<body>

    <button class="back-btn" onclick="history.back()">
        ⬅ Back
    </button>

    <div id="movie">
        Loading...
    </div>

    <script src="movie.js"></script>

</body>
</html>
