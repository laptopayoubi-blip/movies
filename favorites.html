<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Favorites</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    padding:20px;
    text-align:center;
}

header h1{
    margin-bottom:15px;
}

.home-btn{
    background:#e50914;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

.home-btn:hover{
    opacity:.9;
}

#favorites{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.movie{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.movie:hover{
    transform:scale(1.05);
}

.movie img{
    width:100%;
    display:block;
}

.movie-info{
    padding:10px;
}

.movie-info h3{
    margin-bottom:10px;
}

.empty{
    text-align:center;
    margin-top:50px;
    font-size:1.2rem;
}
</style>
</head>
<body>

<header>

    <h1>❤️ My Favorites</h1>

    <button
        class="home-btn"
        onclick="window.location.href='index.html'"
    >
        ⬅ Back Home
    </button>

</header>

<div id="favorites"></div>

<script src="favorites.js"></script>

</body>
</html>
